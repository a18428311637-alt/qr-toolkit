<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Toolkit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- 标题 -->
    <header class="header">
      <h1 class="logo">QR Toolkit</h1>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="generate">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="14.01"/><line x1="21" y1="21" x2="21" y2="21.01"/><line x1="17" y1="21" x2="17" y2="21.01"/></svg>
        生成二维码
      </button>
      <button class="tab" data-tab="recognize">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        识别二维码
      </button>
    </nav>

    <!-- ====== 生成面板 ====== -->
    <section id="panel-generate" class="panel active">
      <div class="panel-body">
        <div class="input-section">
          <label class="section-label" for="qr-input">输入文字或 URL</label>
          <textarea id="qr-input" rows="5" placeholder="例如：https://github.com"></textarea>
          <button id="btn-generate" class="btn btn-primary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            生成二维码
          </button>
        </div>
        <div class="preview-section">
          <label class="section-label">预览</label>
          <div class="preview-card" id="gen-preview-card">
            <div class="preview-placeholder" id="gen-placeholder">
              <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              <span>二维码将在此处显示</span>
            </div>
            <img id="qr-image" hidden />
          </div>
          <button id="btn-save" class="btn btn-accent" hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            保存图片
          </button>
        </div>
      </div>
    </section>

    <!-- ====== 识别面板 ====== -->
    <section id="panel-recognize" class="panel">
      <div class="panel-body">
        <div class="input-section">
          <label class="section-label">选择图片</label>
          <div class="drop-zone" id="drop-zone">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span class="drop-text">点击选择图片或拖拽到此处</span>
            <span class="drop-hint">支持 PNG / JPG / BMP / WebP</span>
          </div>
          <div class="img-preview-wrap" id="img-preview-wrap" hidden>
            <img id="img-preview" />
            <button class="btn-remove" id="btn-remove-img" title="移除图片">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="result-section">
          <label class="section-label">识别结果</label>
          <div class="result-card" id="result-card">
            <div class="result-placeholder" id="result-placeholder">
              <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span>识别内容将显示在此处</span>
            </div>
            <div class="result-content" id="result-content" hidden>
              <p id="result-text"></p>
            </div>
          </div>
          <button id="btn-copy" class="btn btn-accent" hidden>
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制到剪贴板
          </button>
        </div>
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
